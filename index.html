<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Christian Consuelo — Senior Software Engineer</title>
<meta name="description" content="Senior Software Engineer with 10 years of experience building impactful web applications, leading cross-functional teams, and overseeing technical architecture." />
<meta property="og:title" content="Christian Consuelo — Senior Software Engineer" />
<meta property="og:description" content="Senior Software Engineer with 10 years of experience building impactful web applications." />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Space+Grotesk:wght@300;400;500;600&family=Caveat:wght@400;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" integrity="sha384-oODPAiKKDm2IEFXMhTbrONV7NU0mUkqPmGkRNqhBbxjv6MhT4RnEQH5dWlhk8dz" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" integrity="sha384-kIQ8+j9nNvQWb4bRxS1oHpnpPjt3w+v7wgUxL0N/RR8O6E0IbELPpfR5W84bS59" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: oklch(96% 0.018 85);
    --cream-dark: oklch(91% 0.022 85);
    --olive: oklch(40% 0.09 128);
    --olive-light: oklch(55% 0.09 128);
    --olive-pale: oklch(90% 0.04 128);
    --camel: oklch(65% 0.07 72);
    --ink: oklch(18% 0.03 85);
    --ink-mid: oklch(40% 0.03 85);
    --ink-light: oklch(60% 0.03 85);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 48px;
    height: 64px;
    background: var(--cream);
    border-bottom: 1px solid var(--cream-dark);
    transition: background 0.3s;
  }
  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.01em;
    color: var(--ink);
    cursor: pointer;
    text-decoration: none;
  }
  .nav-links {
    display: flex;
    gap: 36px;
    list-style: none;
  }
  .nav-links li {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-mid);
    cursor: pointer;
    transition: color 0.2s;
    position: relative;
  }
  .nav-links li::after {
    content: '';
    position: absolute;
    bottom: -3px; left: 0;
    width: 0; height: 1px;
    background: var(--olive);
    transition: width 0.2s;
  }
  .nav-links li:hover, .nav-links li.active { color: var(--olive); }
  .nav-links li:hover::after, .nav-links li.active::after { width: 100%; }

  /* PAGES */
  .page {
    min-height: 100vh;
    padding-top: 64px;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.5s ease, transform 0.5s ease;
    display: none;
  }
  .page.visible { display: block; }
  .page.entered { opacity: 1; transform: translateY(0); }

  /* ─── HOME PAGE ─── */
  .hero {
    height: calc(100vh - 64px);
    display: grid;
    grid-template-columns: 1fr 1fr;
    position: relative;
    overflow: hidden;
  }
  .hero-left {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px 64px 80px 64px;
    position: relative;
    z-index: 2;
    height: 100%;
  }
  .hero-eyebrow {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--olive);
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .hero-eyebrow::before {
    content: '';
    width: 32px; height: 1px;
    background: var(--olive);
    display: block;
  }
  .hero-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(52px, 7vw, 96px);
    font-weight: 300;
    line-height: 0.95;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 32px;
  }
  .hero-name em { font-style: italic; color: var(--olive); }
  .hero-tagline {
    font-size: 16px;
    font-weight: 300;
    line-height: 1.7;
    color: var(--ink-mid);
    max-width: 420px;
    margin-bottom: 48px;
  }
  .hero-actions { display: flex; gap: 16px; flex-wrap: wrap; }
  .btn-primary {
    background: var(--olive);
    color: var(--cream);
    padding: 14px 32px;
    border: none;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
  }
  .btn-primary:hover { background: oklch(35% 0.09 128); transform: translateY(-1px); }
  .btn-outline {
    background: transparent;
    color: var(--ink);
    padding: 14px 32px;
    border: 1px solid var(--ink-mid);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, transform 0.15s;
  }
  .btn-outline:hover { border-color: var(--olive); color: var(--olive); transform: translateY(-1px); }

  .hero-right {
    position: relative;
    background: var(--ink);
    overflow: hidden;
    height: 100%;
  }

  /* ─── HERO CAROUSEL ─── */
  .hc-track {
    position: absolute;
    inset: 0;
    transition: transform 0.55s cubic-bezier(0.77,0,0.18,1);
  }
  .hc-slide {
    position: absolute;
    inset: 0;
    padding: 0;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: oklch(30% 0.04 128) transparent;
    display: flex;
    flex-direction: column;
  }
  .hc-slide-inner {
    min-height: 100%;
    padding: 48px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .hc-slide-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--olive-light);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .hc-slide-label::before {
    content: '';
    width: 24px; height: 1px;
    background: var(--olive-light);
    display: block;
  }
  .hc-title {
    font-family: 'Impact', 'Arial Narrow', sans-serif;
    font-size: 52px;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: -0.01em;
    color: var(--cream);
    line-height: 0.95;
    margin-bottom: 32px;
  }
  .hc-items { display: flex; flex-direction: column; gap: 2px; margin-bottom: 28px; }
  .hc-item {
    padding: 14px 18px;
    background: oklch(22% 0.03 85);
    border-left: 2px solid transparent;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, padding-left 0.2s;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .hc-item:hover {
    background: oklch(26% 0.04 128);
    border-color: var(--olive-light);
    padding-left: 24px;
  }
  .hc-item-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--cream);
  }
  .hc-item-sub {
    font-size: 11px;
    color: oklch(55% 0.06 128);
    font-weight: 400;
    letter-spacing: 0.06em;
  }
  .hc-item-arrow {
    color: oklch(40% 0.06 128);
    font-size: 16px;
    transition: color 0.2s, transform 0.2s;
  }
  .hc-item:hover .hc-item-arrow { color: var(--olive-light); transform: translateX(4px); }
  .hc-view-all {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--olive-light);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    transition: color 0.2s;
    font-family: 'Space Grotesk', sans-serif;
  }
  .hc-view-all:hover { color: var(--cream); }
  .hc-nav {
    position: absolute;
    right: 24px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 10;
  }
  .hc-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: oklch(35% 0.04 85);
    cursor: pointer;
    transition: background 0.2s, transform 0.2s;
  }
  .hc-dot.active { background: var(--olive-light); transform: scale(1.4); }
  .hc-hint {
    position: absolute;
    bottom: 24px;
    left: 48px;
    font-size: 10px;
    color: oklch(35% 0.03 85);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ─── POLAROID CAROUSEL ─── */
  .polaroid-wrap {
    position: relative;
    height: 340px;
    width: 100%;
  }
  .polaroid {
    position: absolute;
    width: 200px;
    background: #fff;
    padding: 12px 12px 44px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.13), 0 1px 4px rgba(0,0,0,0.08);
    cursor: pointer;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s, z-index 0s;
    user-select: none;
  }
  .polaroid.active {
    box-shadow: 0 12px 40px rgba(0,0,0,0.22), 0 2px 8px rgba(0,0,0,0.1);
    z-index: 10;
  }
  .polaroid-img {
    width: 100%;
    aspect-ratio: 1;
    background: var(--cream-dark);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .polaroid-caption {
    font-family: 'Caveat', cursive;
    font-size: 15px;
    color: oklch(40% 0.03 85);
    text-align: center;
    padding-top: 10px;
    line-height: 1.3;
  }
  .polaroid-controls { display: flex; gap: 8px; margin-top: 16px; }
  .polaroid-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--cream-dark);
    cursor: pointer;
    transition: background 0.2s;
  }
  .polaroid-dot.active { background: var(--olive); }

  /* ─── SECTION COMMON ─── */
  .section-header {
    padding: 80px 64px 48px;
    border-bottom: 1px solid var(--cream-dark);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }
  .section-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--olive);
    margin-bottom: 12px;
  }
  .section-title {
    font-family: 'Impact', 'Arial Narrow', sans-serif;
    font-size: clamp(36px, 5vw, 64px);
    font-weight: 400;
    line-height: 1;
    letter-spacing: -0.01em;
    text-transform: uppercase;
  }
  .section-title em {
    font-style: italic;
    color: var(--olive);
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    text-transform: none;
    font-size: 1.1em;
  }
  .section-count {
    font-family: 'Cormorant Garamond', serif;
    font-size: 80px;
    font-weight: 300;
    color: var(--cream-dark);
    line-height: 1;
  }

  /* ─── ABOUT PAGE ─── */
  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: calc(100vh - 64px - 160px);
  }
  .about-bio {
    padding: 64px;
    border-right: 1px solid var(--cream-dark);
  }
  .about-bio p {
    font-size: 17px;
    font-weight: 300;
    line-height: 1.8;
    color: var(--ink-mid);
    margin-bottom: 24px;
    text-wrap: pretty;
  }
  .about-bio p strong { color: var(--ink); font-weight: 500; }
  .about-sidebar { padding: 64px; display: flex; flex-direction: column; gap: 48px; }
  .interests-row { display: flex; flex-direction: column; gap: 12px; }
  .interest-tag {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: var(--olive-pale);
    border-left: 2px solid var(--olive);
    font-size: 13px;
    font-weight: 500;
    color: var(--olive);
    letter-spacing: 0.04em;
  }
  .edu-block { padding: 24px; border: 1px solid var(--cream-dark); }
  .edu-school {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .edu-degree { font-size: 13px; color: var(--ink-mid); }
  .edu-org { font-size: 12px; color: var(--olive); margin-top: 6px; font-weight: 500; }

  /* ─── EXPERIENCE PAGE ─── */
  .exp-list { padding: 0 64px 80px; }
  .exp-item {
    display: grid;
    grid-template-columns: 200px 1fr;
    border-bottom: 1px solid var(--cream-dark);
    padding: 48px 0;
    gap: 48px;
    transition: background 0.2s;
    position: relative;
  }
  .exp-item::before {
    content: '';
    position: absolute;
    left: -64px; right: -64px;
    top: 0; bottom: 0;
    background: var(--olive-pale);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .exp-item:hover::before { opacity: 1; }
  .exp-item > * { position: relative; z-index: 1; }
  .exp-meta { padding-top: 6px; }
  .exp-company {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .exp-dates { font-size: 12px; color: var(--ink-light); font-weight: 400; margin-bottom: 8px; }
  .exp-tag {
    display: inline-block;
    background: var(--olive);
    color: var(--cream);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 8px;
  }
  .exp-role {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 300;
    color: var(--ink);
    margin-bottom: 16px;
  }
  .exp-bullets { list-style: none; display: flex; flex-direction: column; gap: 10px; }
  .exp-bullets li {
    font-size: 14px;
    font-weight: 300;
    color: var(--ink-mid);
    line-height: 1.6;
    padding-left: 20px;
    position: relative;
    text-wrap: pretty;
  }
  .exp-bullets li::before {
    content: '—';
    position: absolute;
    left: 0;
    color: var(--olive);
    font-size: 12px;
  }

  /* ─── SKILLS PAGE ─── */
  .skills-grid {
    padding: 64px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
  }
  .skill-card {
    background: var(--cream);
    border: 1px solid var(--cream-dark);
    padding: 40px 36px;
    transition: background 0.2s, transform 0.2s;
  }
  .skill-card:hover { background: var(--olive-pale); transform: translateY(-3px); }
  .skill-category {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--olive);
    margin-bottom: 16px;
  }
  .skill-card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 20px;
    line-height: 1.1;
  }
  .skill-tags { display: flex; flex-wrap: wrap; gap: 8px; }
  .skill-tag {
    font-size: 12px;
    font-weight: 400;
    color: var(--ink-mid);
    background: var(--cream-dark);
    padding: 5px 12px;
    transition: background 0.15s, color 0.15s;
  }
  .skill-card:hover .skill-tag { background: oklch(85% 0.05 128); color: var(--olive); }

  /* ─── PROJECTS PAGE ─── */
  .projects-grid {
    padding: 48px 64px 80px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px;
  }
  .proj-card {
    background: var(--cream);
    border: 1px solid var(--cream-dark);
    padding: 40px 40px 36px;
    display: flex;
    flex-direction: column;
    gap: 0;
    transition: background 0.2s, transform 0.2s;
    cursor: default;
    position: relative;
    overflow: hidden;
  }
  .proj-card:hover { background: var(--olive-pale); transform: translateY(-3px); }
  .proj-card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .proj-category {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--olive);
    padding: 4px 10px;
    border: 1px solid var(--olive);
    display: inline-block;
  }
  .proj-type-icon {
    width: 32px; height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-light);
  }
  .proj-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 34px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1;
    margin-bottom: 8px;
  }
  .proj-tagline {
    font-size: 13px;
    font-weight: 500;
    color: var(--camel);
    margin-bottom: 16px;
    letter-spacing: 0.01em;
  }
  .proj-desc {
    font-size: 13px;
    font-weight: 300;
    color: var(--ink-mid);
    line-height: 1.7;
    text-wrap: pretty;
    flex: 1;
    margin-bottom: 24px;
  }
  .proj-tech { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 24px; }
  .proj-tech-tag {
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-mid);
    background: var(--cream-dark);
    padding: 4px 10px;
    letter-spacing: 0.04em;
  }
  .proj-card:hover .proj-tech-tag { background: oklch(85% 0.05 128); color: var(--olive); }
  .proj-links { display: flex; gap: 12px; margin-top: auto; }
  .proj-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    padding: 9px 18px;
    border: 1px solid var(--ink-mid);
    color: var(--ink-mid);
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }
  .proj-link:hover { border-color: var(--olive); color: var(--olive); }
  .proj-link.primary {
    background: var(--olive);
    border-color: var(--olive);
    color: var(--cream);
  }
  .proj-link.primary:hover {
    background: oklch(35% 0.09 128);
    border-color: oklch(35% 0.09 128);
    color: var(--cream);
  }
  .proj-card.cli {
    background: oklch(22% 0.04 128);
    border-color: oklch(30% 0.06 128);
  }
  .proj-card.cli:hover { background: oklch(25% 0.05 128); }
  .proj-card.cli .proj-name { color: oklch(95% 0.02 85); }
  .proj-card.cli .proj-tagline { color: oklch(78% 0.1 128); }
  .proj-card.cli .proj-desc { color: oklch(78% 0.02 85); }
  .proj-card.cli .proj-category { color: oklch(78% 0.1 128); border-color: oklch(60% 0.1 128); }
  .proj-card.cli .proj-type-icon { color: oklch(65% 0.08 128); }
  .proj-card.cli .proj-tech-tag {
    background: oklch(28% 0.05 128);
    color: oklch(80% 0.08 128);
    font-family: monospace;
    font-size: 11px;
  }
  .proj-card.cli:hover .proj-tech-tag { background: oklch(32% 0.07 128); color: oklch(88% 0.1 128); }
  .proj-card.cli .proj-link { border-color: oklch(45% 0.07 128); color: oklch(80% 0.06 128); }
  .proj-card.cli .proj-link:hover { border-color: oklch(70% 0.1 128); color: oklch(88% 0.1 128); }
  .proj-featured-star {
    position: absolute;
    top: 16px; right: 16px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--camel);
  }

  /* ─── CONTACT / SOCIAL ─── */
  .contact-wrap {
    min-height: calc(100vh - 64px - 160px);
    display: grid;
    grid-template-columns: 1fr 1fr;
  }
  .contact-left {
    padding: 64px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    border-right: 1px solid var(--cream-dark);
  }
  .contact-headline {

const PAGES = ['home', 'about', 'experience', 'skills', 'projects', 'contact'];

function usePage() {
  const [page, setPageRaw] = useState(() => {
    const hash = window.location.hash.replace('#', '');
    return PAGES.includes(hash) ? hash : 'home';
  });

  function setPage(targetPage) {
    window.location.hash = targetPage;
    setPageRaw(targetPage);
    window.scrollTo({ top: 0 });
  }

  useEffect(() => {
    const handler = () => {
      const hash = window.location.hash.replace('#', '');
      if (PAGES.includes(hash)) setPageRaw(hash);
    };
    window.addEventListener('hashchange', handler);
    return () => window.removeEventListener('hashchange', handler);
  }, []);

  return [page, setPage];
}

function AnimatedPage({ id, current, children }) {
  const ref = useRef(null);
  const visible = id === current;

  useEffect(() => {
    if (!ref.current) return;
    if (visible) {
      ref.current.style.display = 'block';
      ref.current.style.opacity = '0';
      ref.current.style.transform = 'translateY(20px)';
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          if (ref.current) {
            ref.current.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
            ref.current.style.opacity = '1';
            ref.current.style.transform = 'translateY(0)';
          }
        });
      });
    } else {
      ref.current.style.display = 'none';
    }
  }, [visible]);

  return (
    <div ref={ref} className="page" style={{ display: visible ? 'block' : 'none' }}>
      {children}
    </div>
  );
}

function HeroCarousel({ setPage }) {
  const [current, setCurrent] = useState(0);
  const [animating, setAnimating] = useState(false);
  const containerRef = useRef(null);
  const accRef = useRef(0);
  const total = 3;

  const goTo = (idx) => {
    if (animating) return;
    setAnimating(true);
    setCurrent(((idx % total) + total) % total);
    setTimeout(() => setAnimating(false), 560);
  };

  useEffect(() => {
    const el = containerRef.current;
    if (!el) return;
    const onWheel = (event) => {
      const slide = el.querySelectorAll('.hc-slide')[current];
      if (slide) {
        const atTop = slide.scrollTop === 0;
        const atBottom = slide.scrollHeight - slide.scrollTop <= slide.clientHeight + 1;
        if ((event.deltaY < 0 && !atTop) || (event.deltaY > 0 && !atBottom)) return;
      }
      event.preventDefault();
      accRef.current += event.deltaY;
      if (accRef.current > 60) { goTo(current + 1); accRef.current = 0; }
      else if (accRef.current < -60) { goTo(current - 1); accRef.current = 0; }
    };
    el.addEventListener('wheel', onWheel, { passive: false });
    return () => el.removeEventListener('wheel', onWheel);
  }, [current, animating]);

  const slides = [
    {
      label: '01 / 03 — Projects',
      title: 'Projects',
      items: DATA.projects.map(project => ({ name: project.name, sub: project.category, page: 'projects' })),
      viewAll: 'projects',

    {
      label: '02 / 03 — Experience',
      title: 'Experience',
      items: DATA.experience.map(exp => ({ name: exp.company, sub: exp.role, page: 'experience' })),
      viewAll: 'experience',
    },
    {
      label: '03 / 03 — Skills',
      title: 'Skills',
      items: DATA.skills.map(skill => ({ name: skill.title, sub: skill.category, page: 'skills' })),
      viewAll: 'skills',
    },
  ];

  return (
    <div ref={containerRef} style={{position:'relative',height:'100%',overflow:'hidden',background:'var(--ink)'}}>
      {slides.map((slide, slideIndex) => (
        <div
          key={slideIndex}
          className="hc-track"
          style={{ transform: `translateY(${(slideIndex - current) * 100}%)` }}
        >
          <div className="hc-slide">
            <div className="hc-slide-inner">
              <p className="hc-slide-label">{slide.label}</p>
              <h2 className="hc-title">{slide.title}</h2>
              <div className="hc-items">
                {slide.items.map((item, itemIndex) => (
                  <div key={itemIndex} className="hc-item" onClick={() => setPage(item.page)}>
                    <div>
                      <div className="hc-item-name">{item.name}</div>
                      <div className="hc-item-sub">{item.sub}</div>
                    </div>
                    <span className="hc-item-arrow">→</span>
                  </div>
                ))}
              </div>
              <button className="hc-view-all" onClick={() => setPage(slide.viewAll)}>
                View all {slide.title} →
              </button>
            </div>
          </div>
        </div>
      ))}
      <div className="hc-nav">
        {slides.map((_, dotIndex) => (
          <div key={dotIndex} className={`hc-dot${dotIndex === current ? ' active' : ''}`} onClick={() => goTo(dotIndex)} />
        ))}
      </div>
      <div className="hc-hint">↕ scroll to explore</div>
    </div>
  );
}

function PolaroidSwipe() {
  const [active, setActive] = useState(0);
  const [dragStart, setDragStart] = useState(null);
  const photos = [
    { caption: 'At the gym, 6am grind 💪', color: 'oklch(88% 0.03 80)', icon: '🏋️' },
    { caption: 'Hackathon 2023 — shipped it!', color: 'oklch(88% 0.03 140)', icon: '💻' },
    { caption: 'Gaming setup, circa 2022', color: 'oklch(86% 0.03 260)', icon: '🎮' },
    { caption: 'Mexico City rooftop vibes', color: 'oklch(89% 0.04 60)', icon: '🌆' },
    { caption: 'Coffee & code — the usual', color: 'oklch(90% 0.02 50)', icon: '☕' },
  ];
  const rotations = [-2, 1, -1, 2, -1];

  const prev = () => setActive(currentActive => (currentActive - 1 + photos.length) % photos.length);
  const next = () => setActive(currentActive => (currentActive + 1) % photos.length);

  const onTouchStart = (event) => setDragStart(event.touches[0].clientX);
  const onTouchEnd = (event) => {
    if (dragStart === null) return;
    const diff = dragStart - event.changedTouches[0].clientX;
    if (diff > 40) next();
    else if (diff < -40) prev();
    setDragStart(null);
  };

  return (
    <div>
      <div className="polaroid-swipe-wrap" onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
        <div className="polaroid-swipe-track" style={{transform:`translateX(-${active * 100}%)`}}>
          {photos.map((photo, photoIndex) => (
            <div key={photoIndex} className="polaroid-swipe-item">
              <div className="polaroid-swipe-card" style={{transform:`rotate(${rotations[photoIndex]}deg)`}}>
                <div className="polaroid-swipe-img" style={{background: photo.color}}>
                  <span>{photo.icon}</span>
                </div>
                <div className="polaroid-swipe-caption">{photo.caption}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
      <div className="polaroid-swipe-dots">
        {photos.map((_, dotIndex) => (
          <div key={dotIndex} className={`polaroid-dot${dotIndex === active ? ' active' : ''}`} onClick={() => setActive(dotIndex)} style={{cursor:'pointer'}} />
        ))}
      </div>
    </div>
  );
}
